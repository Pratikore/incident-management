# Honor the platform-provided PORT (Render, etc.); default to 8080 locally.
server.port=${PORT:8080}
spring.application.name=incident-management

# CORS: comma-separated list of allowed frontend origins
app.cors.allowed-origins=http://localhost:5173

# --- Database (SQL) ---
# Defaults to a file-backed H2 database so incidents/users survive restarts
# locally. To use PostgreSQL (e.g. in production) just override these env vars:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://host:5432/incidents
#   SPRING_DATASOURCE_USERNAME=... SPRING_DATASOURCE_PASSWORD=...
#   SPRING_DATASOURCE_DRIVER=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/incidents;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
# Optional in-browser H2 console for local debugging (http://localhost:8080/h2-console).
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}

# Default admin account seeded on first startup (in-memory store).
app.default-admin.username=admin
app.default-admin.password=admin123

# AI provider configuration (optional, OpenAI-compatible). Defaults target
# Groq's free tier. If no key is set, the assistant answers from live incident
# data locally so the app stays fully functional for free.
# Get a free key at https://console.groq.com/keys and set AI_API_KEY (or GROQ_API_KEY).
ai.api-key=${AI_API_KEY:${GROQ_API_KEY:${OPENAI_API_KEY:}}}
ai.base-url=${AI_BASE_URL:https://api.groq.com/openai/v1}
ai.model=${AI_MODEL:llama-3.1-8b-instant}
