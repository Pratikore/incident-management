# PostgreSQL profile. Activate with SPRING_PROFILES_ACTIVE=postgres.
#
# Builds a JDBC datasource from the individual connection fields that Render
# injects via `fromDatabase` (host/port/database/user/password). This avoids the
# mismatch between Render's `connectionString` (postgresql://...) and the
# jdbc:postgresql://... form that the JDBC driver requires.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
