# Tests run against an isolated in-memory database that is recreated each run.
spring.datasource.url=jdbc:h2:mem:incidents-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

# Do not load the demo seed data (data.sql) during tests so assertions stay deterministic.
spring.sql.init.mode=never

# Keep AI disabled so tests exercise the deterministic local fallbacks.
ai.api-key=

# Keep email notifications disabled (logged, not sent) during tests.
app.mail.enabled=false
