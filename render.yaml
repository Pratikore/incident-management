# Render Blueprint for the Incident Management backend.
# This file assumes the "incident-management" folder is the root of the connected repo
# (i.e. it sits next to the backend/ and frontend/ folders). If your repo root is one level
# up, change rootDir to "incident-management/backend".
#
# Out of the box this deploys with a file-backed H2 database (zero setup, but the disk is
# ephemeral on Render's free tier so data resets on redeploy/restart). To use a managed
# PostgreSQL that survives restarts, follow the two "OPTIONAL Postgres" steps below.

# --- OPTIONAL Postgres, step 1: uncomment this block to provision a free managed database ---
# databases:
#   - name: incident-db
#     plan: free
#     databaseName: incidents
#     user: incident

services:
  - type: web
    name: incident-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /v3/api-docs
    autoDeploy: true
    envVars:
      # Spring Boot listens on $PORT (see application.properties: server.port=${PORT:8080}).
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx400m
      # Optional: paste a free Groq key in the Render dashboard to enable full AI chat.
      - key: AI_API_KEY
        sync: false
      - key: APP_DEFAULT_ADMIN_USERNAME
        value: admin
      # Set your own admin password in the Render dashboard.
      - key: APP_DEFAULT_ADMIN_PASSWORD
        sync: false
      # --- OPTIONAL Postgres, step 2: uncomment these to point the app at the database above ---
      # - key: SPRING_PROFILES_ACTIVE
      #   value: postgres
      # - key: DB_HOST
      #   fromDatabase: { name: incident-db, property: host }
      # - key: DB_PORT
      #   fromDatabase: { name: incident-db, property: port }
      # - key: DB_NAME
      #   fromDatabase: { name: incident-db, property: database }
      # - key: DB_USER
      #   fromDatabase: { name: incident-db, property: user }
      # - key: DB_PASSWORD
      #   fromDatabase: { name: incident-db, property: password }
