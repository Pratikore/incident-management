services:
  backend:
    build:
      context: ./backend
    image: incident-management-backend
    container_name: incident-backend
    ports:
      - "8080:8080"
    environment:
      # Optional: drop in a free Groq key to enable full conversational AI.
      # Without it the assistant answers from live incident data locally.
      AI_API_KEY: ${AI_API_KEY:-}
      # Default admin seeded on first run (change after logging in).
      APP_DEFAULT_ADMIN_USERNAME: ${APP_DEFAULT_ADMIN_USERNAME:-admin}
      APP_DEFAULT_ADMIN_PASSWORD: ${APP_DEFAULT_ADMIN_PASSWORD:-admin123}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: incident-management-frontend
    container_name: incident-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
